<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vista del PDF</title>
  <style>
    html, body { height: 100%; margin: 0; }
    header {
      padding: 12px 16px;
      font-family: Arial, sans-serif;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .frame { width: 100%; height: calc(100% - 50px); border: 0; }
  </style>
</head>
<body>
  <header>
    <strong>Documento</strong>
    <a href="docs/Guía de uso pedagogíco de primaria.pdf" target="_blank" rel="noopener">Abrir en otra pestaña</a>
    <a href="docs/Guía de uso pedagogíco de primaria.pdf" download>Descargar</a>
  </header>

  <iframe class="frame" src="docs/miarchivo.pdf"></iframe>
</body>
</html>
